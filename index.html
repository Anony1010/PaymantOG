<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="GASHAM - Professional QR Order & POS System" />
  <title>GASHAM - QR POS</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="loading-screen">
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-g">GASHAM</div>
      <div class="loader-sub">POS sistemi</div>
    </div>
  </div>

  <div id="toast-container"></div>

  <div id="scan-overlay" class="hidden">
    <div class="so-icon">✓</div>
    <div class="so-text">QR uğurla oxundu</div>
  </div>

  <div id="app" class="hidden">
    <header class="header">
      <div class="header-left">
        <span class="brand">GASHAM<span class="brand-dot"></span></span>
      </div>
      <div class="header-right">
        <button id="theme-btn" class="btn-icon" aria-label="Mövzu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a href="admin.html" class="btn-icon" aria-label="Admin" title="Admin" style="display:flex;align-items:center;justify-content:center;color:var(--text);text-decoration:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
      </div>
    </header>

    <div class="hero">
      <button id="new-order-btn" class="btn-hero">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Yeni Sifariş
      </button>
    </div>

    <!-- Cart -->
    <div id="cart-section" class="hidden">
      <div class="cart-head">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
        <h3>Hazırkı Sifariş</h3>
        <span id="cart-badge" class="cart-badge">0</span>
      </div>
      <div class="cart-body" id="cart-body">
        <div class="cart-empty">Məhsul əlavə edilməyib</div>
      </div>
      <div class="cart-foot">
        <div class="cart-row"><span>Məhsul sayı</span><span id="cart-count">0</span></div>
        <div class="cart-row total"><span>Cəmi</span><span id="cart-total">0.00 ₼</span></div>
        <button id="confirm-btn" class="btn-confirm">Təsdiqlə</button>
      </div>
    </div>

    <!-- Scanner Modal -->
    <div id="scanner-modal" class="modal hidden">
      <div class="modal-bd"></div>
      <div class="modal-content" style="max-width:400px;padding:0;overflow:hidden">
        <div class="modal-head">
          <h3>QR Kod Oxu</h3>
          <button class="btn-x" id="scanner-close">&times;</button>
        </div>
        <div class="scanner-wrap">
          <div class="scanner-view">
            <div class="scan-frame">
              <div class="scan-c tl"></div><div class="scan-c tr"></div>
              <div class="scan-c bl"></div><div class="scan-c br"></div>
              <div class="scan-line"></div>
            </div>
            <div id="scanner-el"></div>
          </div>
          <div class="scan-ctrls">
            <button id="flash-btn" class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </button>
            <button id="cam-btn" class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>
          </div>
          <p class="scan-hint">QR kodu çərçivəyə yerləşdirin</p>
        </div>
      </div>
    </div>

    <!-- Review Modal -->
    <div id="review-modal" class="modal hidden">
      <div class="modal-bd"></div>
      <div class="modal-content">
        <div class="modal-head">
          <h3 id="review-title">Sifariş Detalları</h3>
          <button class="btn-x" id="review-close">&times;</button>
        </div>
        <div id="review-body" class="modal-body"></div>
      </div>
    </div>

    <!-- History -->
    <div class="history-wrap">
      <div class="history-head">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--accent2)"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <h2>Sifariş Tarixçəsi</h2>
        <span id="hist-count" class="hist-badge">0</span>
      </div>
      <div id="history-list">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
          <p>İlk sifarişinizi yaradın</p>
          <p class="sub">Yeni sifariş düyməsinə toxunun</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
