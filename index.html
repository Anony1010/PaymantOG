<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="GASHAM - Professional QR Order & POS System" />
  <title>GASHAM - QR POS Sistemi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader">
      <div class="loader-ring"></div>
      <div class="loader-text">GASHAM</div>
      <div class="loader-sub">Yüklənir...</div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scan Success Overlay -->
  <div id="scan-success-overlay" class="scan-success-overlay hidden">
    <div class="scan-success-icon">✓</div>
    <div class="scan-success-text">QR uğurla oxundu</div>
  </div>

  <!-- App Container -->
  <div id="app" class="hidden">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="brand">GASHAM</span>
        <span class="brand-sub">POS Sistemi</span>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="btn-icon" aria-label="Mövzu dəyiş">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button id="admin-btn" class="btn-icon" aria-label="Admin panel" title="Admin panel">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- New Order Button -->
      <div class="new-order-section">
        <button id="new-order-btn" class="btn-new-order">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>Yeni Sifariş</span>
        </button>
      </div>

      <!-- Active Order Cart Section -->
      <div id="cart-section" class="cart-section hidden">
        <div class="cart-header">
          <h3>Hazırkı Sifariş</h3>
          <span id="cart-badge" class="badge">0</span>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
          <div class="cart-summary">
            <div class="cart-summary-row">
              <span>Məhsul sayı:</span>
              <span id="cart-item-count">0</span>
            </div>
            <div class="cart-summary-row">
              <span>Ara cəm:</span>
              <span id="cart-subtotal">0.00 ₼</span>
            </div>
            <div class="cart-summary-row total-row">
              <span>Ümumi məbləğ:</span>
              <span id="cart-total">0.00 ₼</span>
            </div>
          </div>
          <button id="confirm-order-btn" class="btn-confirm-order">Təsdiqlə</button>
        </div>
      </div>

      <!-- Scanner Modal -->
      <div id="scanner-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content scanner-modal-content">
          <div class="modal-header">
            <h3>QR Kod Oxu</h3>
            <button class="btn-close" id="scanner-close">&times;</button>
          </div>
          <div class="scanner-container">
            <div id="scanner-viewport" class="scanner-viewport">
              <div class="scanner-frame">
                <div class="scanner-corner tl"></div>
                <div class="scanner-corner tr"></div>
                <div class="scanner-corner bl"></div>
                <div class="scanner-corner br"></div>
                <div class="scanner-line"></div>
              </div>
              <div id="scanner-element"></div>
            </div>
            <div class="scanner-controls">
              <button id="flash-toggle" class="btn-scanner-ctrl" aria-label="Flash">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
              </button>
              <button id="camera-switch" class="btn-scanner-ctrl" aria-label="Kamera dəyiş">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
              </button>
            </div>
            <p class="scanner-hint">QR kodu çərçivəyə yerləşdirin</p>
          </div>
        </div>
      </div>

      <!-- Admin Login Modal -->
      <div id="admin-login-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content sm">
          <div class="modal-header">
            <h3>Admin Giriş</h3>
            <button class="btn-close" id="admin-login-close">&times;</button>
          </div>
          <div class="modal-body">
            <div class="auth-brand" style="margin-bottom:20px">
              <div class="auth-logo">G</div>
            </div>
            <form id="admin-login-form" autocomplete="off">
              <div class="form-group">
                <label>Admin Kodu</label>
                <input type="password" id="admin-code-input" placeholder="Kodu daxil edin" required autocomplete="off" />
              </div>
              <p id="admin-login-error" class="error-message hidden"></p>
              <button type="submit" id="admin-login-btn" class="btn btn-primary btn-block">Giriş</button>
            </form>
            <button id="admin-logout-btn" class="btn btn-outline btn-block hidden" style="margin-top:12px">Çıxış</button>
          </div>
        </div>
      </div>

      <!-- Order Review Modal -->
      <div id="review-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="review-title">Sifariş Detalları</h3>
            <button class="btn-close" id="review-close">&times;</button>
          </div>
          <div id="review-body" class="modal-body"></div>
        </div>
      </div>
    </main>

    <!-- Order History Section (below main, separate) -->
    <section class="history-section">
      <div class="history-header">
        <h2>Sifariş Tarixçəsi</h2>
        <span id="history-count" class="badge">0</span>
      </div>
      <div id="history-list" class="orders-list">
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <p>Hələ heç bir sifariş yoxdur</p>
        </div>
      </div>
    </section>

    <!-- Bottom spacer for cart -->
    <div id="cart-spacer" class="cart-spacer hidden"></div>
  </div>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-storage-compat.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
